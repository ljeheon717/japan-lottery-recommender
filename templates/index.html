<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🎰 日本ロット 番号推薦</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <div class="container">
    <header>
      <h1>🎰 日本ロット 番号推薦</h1>
      <p class="subtitle">일본 로또 번호 추천 &amp; 당첨 번호 조회</p>
    </header>

    <div class="tabs">
      <button class="tab active" data-tab="generate">번호 추천</button>
      <button class="tab" data-tab="purchases">내 구매 기록</button>
      <button class="tab" data-tab="results">당첨 번호</button>
    </div>

    <!-- 번호 추천 탭 -->
    <div id="generate" class="tab-content active">
      <div class="card">
        <div class="controls">

          <!-- 로또 종류 -->
          <div class="control-group">
            <label>로또 종류</label>
            <div class="btn-group">
              <button class="type-btn active" data-type="loto6">ロト6</button>
              <button class="type-btn" data-type="loto7">ロト7</button>
              <button class="type-btn" data-type="miniloto">ミニロト</button>
            </div>
          </div>

          <!-- 추천 방식 -->
          <div class="control-group">
            <label>추천 방식</label>
            <div class="btn-group">
              <button class="mode-btn active" data-mode="random">
                🎲 랜덤
              </button>
              <button class="mode-btn" data-mode="frequency">
                📊 빈도 기반
              </button>
              <button class="mode-btn" data-mode="saju">
                ☯️ 오행 기반
              </button>
              <button class="mode-btn" data-mode="mypick">
                🗂️ 내 번호 조합
              </button>
            </div>
          </div>

          <!-- 내 번호 조합 안내/선택 -->
          <div id="mypick-panel" class="control-group hidden">
            <label>조합에 사용할 구매 기록 <span class="label-hint">(선택, '내 구매 기록' 탭에서 추가)</span></label>
            <div id="mypick-list" class="mypick-list"></div>
            <div class="label-hint">낙첨(당첨 번호 0개 일치) 조합의 번호는 우선 가중치로 추천에 반영됩니다</div>
          </div>

          <!-- 세트 수 -->
          <div class="control-group">
            <label>세트 수</label>
            <div class="btn-group">
              <button class="count-btn active" data-count="1">1세트</button>
              <button class="count-btn" data-count="3">3세트</button>
              <button class="count-btn" data-count="5">5세트</button>
              <button class="count-btn" data-count="10">10세트</button>
            </div>
          </div>

          <!-- 고정 번호 -->
          <div class="control-group">
            <label>고정 번호 <span class="label-hint">(최대 3개, 선택)</span></label>
            <div class="fixed-inputs">
              <input class="fixed-input" type="number" placeholder="번호" min="1" max="43" />
              <input class="fixed-input" type="number" placeholder="번호" min="1" max="43" />
              <input class="fixed-input" type="number" placeholder="번호" min="1" max="43" />
            </div>
          </div>

          <!-- 옵션 안내 -->
          <div class="control-group">
            <div class="info-badge">🔒 과거 당첨 조합 자동 제외 적용</div>
          </div>

        </div>
        <button id="generate-btn" class="primary-btn">번호 생성 🎲</button>
        <div id="generate-result"></div>
      </div>
    </div>

    <!-- 내 구매 기록 탭 -->
    <div id="purchases" class="tab-content">
      <div class="card">
        <div class="controls">
          <div class="control-group">
            <label>로또 종류</label>
            <div class="btn-group">
              <button class="ptype-btn active" data-type="loto6">ロト6</button>
              <button class="ptype-btn" data-type="loto7">ロト7</button>
              <button class="ptype-btn" data-type="miniloto">ミニロト</button>
            </div>
          </div>
          <div class="control-group">
            <label>구매 기록 추가</label>
            <div class="purchase-form">
              <input id="purchase-round" class="purchase-input" type="text" placeholder="회차 (예: 2105)" />
              <input id="purchase-numbers" class="purchase-input purchase-input-wide" type="text"
                     placeholder="구매 번호 (쉼표로 구분, 예: 3,12,19,24,32,41)" />
              <button id="purchase-add-btn" class="secondary-btn">기록 추가 ➕</button>
            </div>
            <div class="label-hint">회차 번호로 당첨 결과를 자동 조회해 일치 개수를 비교합니다 (조회 가능한 최근 이력 범위 내에서만)</div>
          </div>
          <div class="control-group">
            <div class="info-badge">💡 기록을 체크하면 '번호 추천' 탭의 🗂️ 내 번호 조합 방식에서 해당 번호 풀로 추천을 생성합니다</div>
          </div>
        </div>
        <div id="purchase-add-msg"></div>
        <div id="purchase-list"></div>
      </div>
    </div>

    <!-- 당첨 번호 탭 -->
    <div id="results" class="tab-content">
      <div class="card">
        <div class="controls">
          <div class="control-group">
            <label>로또 종류</label>
            <div class="btn-group">
              <button class="rtype-btn active" data-type="loto6">ロト6</button>
              <button class="rtype-btn" data-type="loto7">ロト7</button>
              <button class="rtype-btn" data-type="miniloto">ミニロト</button>
            </div>
          </div>
        </div>
        <div class="action-row">
          <button id="fetch-btn" class="primary-btn">당첨 번호 조회 🔍</button>
        </div>
        <div id="source-badge"></div>
        <div id="results-result"></div>
        <div id="pagination"></div>
      </div>
    </div>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>
